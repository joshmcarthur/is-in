# Cloudflare Worker + Astro (control plane API at /api/*).
# Replace KV IDs before deploy. Secrets: `wrangler secret put SESSION_SECRET` (from apps/management).
name = "is-in-management"
compatibility_date = "2025-01-01"
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/*", "!/_astro/*"]

[[kv_namespaces]]
binding = "KV"
id = "779184d4ccd842dda9a33fb40845fa85"
preview_id = "2d733b8ee95746f6bdd3693ef2de6b7d"

[vars]
OTP_FROM = "noreply@is-in.nz"
OTP_SUBJECT = "Your is-in.nz sign-in code"

# Sender is set in app code (OTP_FROM). Restrict via Email Service domain verification in production.
[[send_email]]
name = "EMAIL"

[ai]
binding = "AI"
remote = true

[env.staging]
name = "is-in-management-staging"

[env.staging.assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = ["/*", "!/_astro/*"]

[[env.staging.kv_namespaces]]
binding = "KV"
id = "f3578122d7424930ab2d78c34abdf22c"
preview_id = "f6d6ae7d37e44bb987df340aaebdd17b"

[env.staging.vars]
OTP_FROM = "noreply@is-in.nz"
OTP_SUBJECT = "Your is-in.nz sign-in code (test)"

[[env.staging.send_email]]
name = "EMAIL"

[env.staging.ai]
binding = "AI"
remote = true

[[env.staging.routes]]
pattern = "test.is-in.nz/*"
zone_name = "is-in.nz"
